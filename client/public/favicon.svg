<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7E57C2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5E35B1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#grad1)" stroke="#4527A0" stroke-width="1"/>
  
  <!-- 4S Graphics symbol -->
  <g fill="white" font-family="Arial, sans-serif" font-weight="bold">
    <!-- "4" -->
    <text x="8" y="14" font-size="12" text-anchor="middle">4</text>
    <!-- "S" -->
    <text x="24" y="14" font-size="12" text-anchor="middle">S</text>
    <!-- "G" for Graphics -->
    <text x="16" y="26" font-size="10" text-anchor="middle">G</text>
  </g>
  
  <!-- Small accent dots -->
  <circle cx="6" cy="6" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="26" cy="6" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="6" cy="26" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="26" cy="26" r="1.5" fill="white" opacity="0.8"/>
</svg>